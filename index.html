<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sitio en Construcción</title>
    <!-- Usamos CDN de Tailwind CSS para aplicar los estilos de forma estática -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body
    class="bg-gray-900 text-white min-h-screen flex flex-col items-center justify-center relative overflow-hidden font-sans">

    <!-- Fondo con gradientes animados -->
    <div class="absolute inset-0 w-full h-full overflow-hidden z-0 pointer-events-none">
        <div
            class="absolute -top-[20%] -left-[10%] w-[50%] h-[50%] bg-blue-600/20 blur-[120px] rounded-full mix-blend-screen animate-pulse">
        </div>
        <div class="absolute top-[20%] -right-[10%] w-[40%] h-[60%] bg-purple-600/20 blur-[120px] rounded-full mix-blend-screen animate-pulse"
            style="animation-delay: 2s;"></div>
        <div class="absolute -bottom-[20%] left-[20%] w-[60%] h-[50%] bg-teal-600/20 blur-[120px] rounded-full mix-blend-screen animate-pulse"
            style="animation-delay: 4s;"></div>
    </div>

    <!-- Tarjeta de contenido Glassmorphism -->
    <div
        class="relative z-10 p-10 md:p-16 backdrop-blur-xl bg-white/5 border border-white/10 shadow-2xl rounded-3xl max-w-2xl text-center mx-4 hover:scale-[1.02] transition-transform duration-500">
        <div class="mb-8 flex justify-center">
            <div class="p-4 bg-white/5 rounded-full border border-white/10 shadow-inner">
                <svg class="w-16 h-16 text-blue-400 animate-bounce" fill="none" stroke="currentColor"
                    viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                        d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4">
                    </path>
                </svg>
            </div>
        </div>

        <h1
            class="text-5xl md:text-6xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 via-purple-400 to-teal-400 mb-6 tracking-tight">
            En Construcción
        </h1>

        <p class="text-gray-300 text-lg md:text-xl mb-10 leading-relaxed font-light">
            Estamos preparando una experiencia increíble. Vuelve pronto para descubrir todas las novedades que estamos
            diseñando para ti.
        </p>

        <!-- Indicadores de carga animados -->
        <div class="flex justify-center items-center gap-3">
            <div class="h-1.5 w-12 bg-blue-500 rounded-full animate-pulse"></div>
            <div class="h-1.5 w-12 bg-purple-500 rounded-full animate-pulse" style="animation-delay: 0.2s;"></div>
            <div class="h-1.5 w-12 bg-teal-500 rounded-full animate-pulse" style="animation-delay: 0.4s;"></div>
        </div>
    </div>

    <!-- Footer simple -->
    <div class="absolute bottom-6 w-full text-center z-10">
        <p class="text-gray-500 text-sm font-medium">
            ©
            <script>document.write(new Date().getFullYear())</script> - Todos los derechos reservados
        </p>
    </div>
</body>

</html>
